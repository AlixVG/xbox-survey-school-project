<!DOCTYPE html>
<html lang="fr">
<div class="index">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - Enquête en ligne</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <img src="images/xboxlogo.png" alt="Xbox Logo" width="360" height="240"  class="logo">
    <br>
    <div class="container">
        <h1>Fan de la Xbox ? Votre avis nous intéresse !</h1>
        <form id="userForm" action="enquete.html" method="POST">
            <p>Pour commencer, entrez votre nom et prénom :</p>
            <label for="nom">Nom :</label>
            <input type="text" id="nom" name="nom" required>
            <br>
            <label for="prenom">Prénom :</label>
            <input type="text" id="prenom" name="prenom" required>
            <br>
            <button type="submit">Commencer</button>
        </form>
    </div>
    <script>
        document.getElementById('userForm').addEventListener('submit', function(event) {
            const prenom = document.getElementById('prenom').value;
            const nom = document.getElementById('nom').value;

            // Set cookies
            document.cookie = `prenom=${encodeURIComponent(prenom)}; path=/; max-age=3600`; // 1 hour
            document.cookie = `nom=${encodeURIComponent(nom)}; path=/; max-age=3600`;
        });
    </script>
</body>
</div>
</html>
